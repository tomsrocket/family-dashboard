  <body class="bg-dark text-white">

<div class="container py-4">
  <h2 class="mb-4">Zuletzt gespielt</h2>
  <div id="spotify-list" class="row g-3"></div>
</div>
<script>

async function loadSpotify() {
  try {
    const res = await fetch('data/spotify.json');
    const data = await res.json();

    const container = document.getElementById('spotify-list');
    container.innerHTML = '';

    data.forEach(track => {
      const date = new Date(track.played_at);

      const formattedDate = date.toLocaleString('de-DE', {
        hour: '2-digit',
        minute: '2-digit',
        day: '2-digit',
        month: '2-digit'
      });

      const card = document.createElement('div');
      card.className = 'col-12 col-md-6 col-lg-4';

      card.innerHTML = `
        <div class="card bg-secondary text-white h-100 shadow-sm">
          <div class="row g-0">
            <div class="col-4">
              <img src="${track.cover}" class="img-fluid rounded-start" alt="cover">
            </div>
            <div class="col-8">
              <div class="card-body p-2">
                <h6 class="card-title mb-1">${track.song}</h6>
                <p class="card-text mb-1 text-light small">${track.artist}</p>
                <p class="card-text">
                  <small class="text-muted">${formattedDate}</small>
                </p>
              </div>
            </div>
          </div>
        </div>
      `;

      container.appendChild(card);
    });

  } catch (err) {
    console.error('Fehler beim Laden:', err);
  }
}

// initial laden
loadSpotify();

// optional: auto-refresh alle 1 Minuten
setInterval(loadSpotify, 60000);

initButtons(function() {window.location.href = "index.html";}, 
  function() {window.location.href = "page3.html";}
)


</script>
</body>
</html>
